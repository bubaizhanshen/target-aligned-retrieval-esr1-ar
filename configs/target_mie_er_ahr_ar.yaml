study:
  id: target_mie_er_ahr_ar
  title: Target and MIE task layer for ERalpha, AhR, and AR

inputs:
  pollutant_endpoint_catalog: data/ctx_er_ahr_ar_bulk/ctx_target_endpoints.csv
  pollutant_bioactivity_rows: data/ctx_er_ahr_ar_bulk/ctx_bioactivity_rows.csv
  pollutant_chemical_details: data/ctx_er_ahr_ar_bulk/ctx_chemical_details.csv
  natural_product_base_labels: data/chembl_np_er_ahr_ar/chembl_np_labels.csv
  natural_product_activity_rows: data/chembl_np_er_ahr_ar/chembl_np_activity_rows.csv

targets:
  - axis: ERalpha
    chembl_axis: er_alpha
    target_prefix: esr1
    base_label_column: er_alpha_active
    mechanisms:
      - binding
      - agonism
      - antagonism
      - reporter
  - axis: AhR
    chembl_axis: ahr
    target_prefix: ahr
    base_label_column: ahr_active
    mechanisms:
      - binding
      - agonism
      - reporter
  - axis: AR
    chembl_axis: ar
    target_prefix: ar
    base_label_column: ar_active
    mechanisms:
      - binding
      - agonism
      - antagonism
      - reporter

global_mechanism_tasks:
  binding: mie_receptor_binding
  agonism: mie_receptor_agonism
  antagonism: mie_receptor_antagonism
  reporter: reporter_response

labeling:
  pollutant_active_if_hitc_gte: 0.9
  natural_product_active_if_pchembl_gte: 5.0

outputs:
  pollutant_dir: data/ctx_target_mie_er_ahr_ar
  natural_product_dir: data/chembl_np_target_mie_er_ahr_ar
