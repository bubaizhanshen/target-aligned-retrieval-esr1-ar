study:
  id: chembl_source_target_mie_er_ahr_ar
  title: Mixed ChEMBL source-domain target/MIE labels for natural products and generic bioactives

inputs:
  chembl_molecules_all: data/chembl_np_er_ahr_ar/chembl_molecules_all.csv
  chembl_activity_rows: data/chembl_np_er_ahr_ar/chembl_activity_rows.csv

targets:
  - axis: ERalpha
    chembl_axis: er_alpha
    target_prefix: esr1
    base_label_column: er_alpha_active
    mechanisms:
      - binding
      - agonism
      - antagonism
      - reporter
  - axis: AhR
    chembl_axis: ahr
    target_prefix: ahr
    base_label_column: ahr_active
    mechanisms:
      - binding
      - agonism
      - reporter
  - axis: AR
    chembl_axis: ar
    target_prefix: ar
    base_label_column: ar_active
    mechanisms:
      - binding
      - agonism
      - antagonism
      - reporter

global_mechanism_tasks:
  binding: mie_receptor_binding
  agonism: mie_receptor_agonism
  antagonism: mie_receptor_antagonism
  reporter: reporter_response

labeling:
  source_active_if_pchembl_gte: 5.0

outputs:
  source_dir: data/chembl_source_target_mie_er_ahr_ar
